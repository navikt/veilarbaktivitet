apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: veilarbaktivitet-error-rate
  namespace: dab
  labels:
    team: dab
spec:
  groups:
    - name: SLOs-haproxy_backend_http_responses_total
      rules:
        - alert: veialrbaktivitetIngerssMetrikkenFinnesIkke
          annotations:
            message: 'veilarbaktivitet metrikken eksisterer ikke i haproxy_backend_http_responses_total'
          expr: |
            absent(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http"})
          for: 15m
          labels:
            namespace: dab
            service: veilarbaktivitet
            severity: warning
        - alert: VeilarbaktivitetErrorBudgetBurn
          annotations:
            message: 'High error budget burn for service=veilarbaktivitet (current value: {{ $value }})'
          expr: |
            sum(haproxy_backend_http_responses_total:burnrate5m{proxy="dab_svc_veilarbaktivitet_http"}) > (14.40 * (1-0.99900))
            and
            sum(haproxy_backend_http_responses_total:burnrate1h{proxy="dab_svc_veilarbaktivitet_http"}) > (14.40 * (1-0.99900))
            and
            mellom_kl_06_og_23
          for: 2m
          labels:
            namespace: dab
            service: veilarbaktivitet
            severity: critical
        - alert: VeilarbaktivitetErrorBudgetBurn
          annotations:
            message: 'High error budget burn for service=veilarbaktivitet (current value: {{ $value }})'
          expr: |
            sum(haproxy_backend_http_responses_total:burnrate30m{proxy="dab_svc_veilarbaktivitet_http"}) > (6.00 * (1-0.99900))
            and
            sum(haproxy_backend_http_responses_total:burnrate6h{proxy="dab_svc_veilarbaktivitet_http"}) > (6.00 * (1-0.99900))
            and
            mellom_kl_06_og_23
          for: 15m
          labels:
            namespace: dab
            service: veilarbaktivitet
            severity: critical
        - alert: VeilarbaktivitetErrorBudgetBurn
          annotations:
            message: 'High error budget burn for service=veilarbaktivitet (current value: {{ $value }})'
          expr: |
            sum(haproxy_backend_http_responses_total:burnrate2h{proxy="dab_svc_veilarbaktivitet_http"}) > (3.00 * (1-0.99900))
            and
            sum(haproxy_backend_http_responses_total:burnrate1d{proxy="dab_svc_veilarbaktivitet_http"}) > (3.00 * (1-0.99900))
          for: 1h
          labels:
            namespace: dab
            service: veilarbaktivitet
            severity: warning
        - alert: VeilarbaktivitetErrorBudgetBurn
          annotations:
            message: 'High error budget burn for service=veilarbaktivitet (current value: {{ $value }})'
          expr: |
            sum(haproxy_backend_http_responses_total:burnrate6h{proxy="dab_svc_veilarbaktivitet_http"}) > (1.00 * (1-0.99900))
            and
            sum(haproxy_backend_http_responses_total:burnrate3d{proxy="dab_svc_veilarbaktivitet_http"}) > (1.00 * (1-0.99900))
          for: 3h
          labels:
            service: veilarbaktivitet
            severity: warning
        - record: mellom_kl_06_og_23
          expr: |
            (hour() >= 6 and hour() <= 23)

        - expr: |
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http",code="5xx"}[1d]))
            /
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http"}[1d]))
          labels:
            service: veilarbaktivitet
          record: haproxy_backend_http_responses_total:burnrate1d
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http",code="5xx"}[1h]))
            /
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http"}[1h]))
          labels:
            service: veilarbaktivitet
          record: haproxy_backend_http_responses_total:burnrate1h
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http",code="5xx"}[2h]))
            /
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http"}[2h]))
          labels:
            service: veilarbaktivitet
          record: haproxy_backend_http_responses_total:burnrate2h
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http",code="5xx"}[30m]))
            /
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http"}[30m]))
          labels:
            service: veilarbaktivitet
          record: haproxy_backend_http_responses_total:burnrate30m
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http",code="5xx"}[3d]))
            /
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http"}[3d]))
          labels:
            service: veilarbaktivitet
          record: haproxy_backend_http_responses_total:burnrate3d
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http",code="5xx"}[5m]))
            /
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http"}[5m]))
          labels:
            service: veilarbaktivitet
          record: haproxy_backend_http_responses_total:burnrate5m
        - expr: |
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http",code="5xx"}[6h]))
            /
            sum(rate(haproxy_backend_http_responses_total{proxy="dab_svc_veilarbaktivitet_http"}[6h]))
          labels:
            service: veilarbaktivitet
          record: haproxy_backend_http_responses_total:burnrate6h
